name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? Why is it needed?
      placeholder: I find it tedious to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Include CLI examples if applicable.
      placeholder: |
        `weg <new-command> --flag value`

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI commands
        - MCP server
        - Configuration (weg.toml / pyproject.toml)
        - Container / runtime
        - Other
