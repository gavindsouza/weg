name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
      placeholder: When I run `weg sync`, it fails with...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Create a new app with `weg new myapp`
        2. Run `weg sync`
        3. See error
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Run `weg version` and `go version` and paste the output.
      render: shell

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output. Use `weg -vvv <command>` for debug output.
      render: shell
