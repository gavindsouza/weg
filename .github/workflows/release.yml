name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: Linux-x86_64
          - goos: linux
            goarch: arm64
            suffix: Linux-aarch64
          - goos: darwin
            goarch: amd64
            suffix: Darwin-x86_64
          - goos: darwin
            goarch: arm64
            suffix: Darwin-arm64

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.24"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -trimpath \
            -ldflags="-s -w \
              -X github.com/gavindsouza/weg/cmd.Version=${{ github.ref_name }} \
              -X github.com/gavindsouza/weg/cmd.Commit=${COMMIT} \
              -X github.com/gavindsouza/weg/cmd.BuildDate=${BUILD_DATE}" \
            -o weg-${{ matrix.suffix }} .

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: weg-${{ matrix.suffix }}
          path: weg-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum weg-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            dist/weg-*
            dist/checksums.txt
          generate_release_notes: true
