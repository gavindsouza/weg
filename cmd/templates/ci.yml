name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=5s --health-timeout=2s --health-retries=3

      redis-cache:
        image: redis:alpine
        ports:
          - 13000:6379
      redis-queue:
        image: redis:alpine
        ports:
          - 11000:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Frappe bench
        run: pip install frappe-bench

      - name: Initialize bench
        run: |
          bench init --skip-redis-config-generation frappe-bench
          cd frappe-bench
          bench get-app ${{ github.workspace }}

      - name: Create test site
        working-directory: frappe-bench
        run: |
          bench new-site --mariadb-root-password root --admin-password admin test.localhost
          bench --site test.localhost install-app {{MODULE_NAME}}

      - name: Run tests
        working-directory: frappe-bench
        run: bench --site test.localhost run-tests --app {{MODULE_NAME}}
