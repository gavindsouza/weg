# Pre-commit hooks for Frappe app development
# Install: pip install pre-commit && pre-commit install

repos:
  # Frappe-specific semgrep rules
  - repo: https://github.com/frappe/semgrep-rules
    rev: v0.5.0
    hooks:
      - id: frappe-correctness
        name: Frappe Correctness
        description: Check for common Frappe antipatterns
      - id: frappe-ux
        name: Frappe UX
        description: Check user-facing text is translated
      - id: frappe-translate
        name: Frappe Translation
        description: Check translation function usage

  # General Python linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        name: Ruff Linter
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: Ruff Formatter

  # Python type checking (optional, remove if not using type hints)
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.8.0
  #   hooks:
  #     - id: mypy
  #       additional_dependencies: [types-all]
  #       args: [--ignore-missing-imports]

  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
        exclude: '\.json$'
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: debug-statements
        name: Check for debug statements (pdb, breakpoint)

  # JavaScript/CSS (if using frontend assets)
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.18.0
    hooks:
      - id: eslint
        name: ESLint
        files: \.(js|jsx)$
        types: [file]
        additional_dependencies:
          - eslint@8.56.0
        args: [--fix]

  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.2
    hooks:
      - id: bandit
        name: Bandit Security Scanner
        args: [-c, pyproject.toml, -r]
        additional_dependencies: ["bandit[toml]"]
        exclude: test_.*\.py$

# CI configuration
ci:
  autofix_commit_msg: "style: auto-fix from pre-commit hooks"
  autofix_prs: true
  autoupdate_commit_msg: "chore: update pre-commit hooks"
  autoupdate_schedule: weekly
