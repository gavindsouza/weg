# Mining Sources Configuration
# Defines where Miner polecats should look for pain points

# ─────────────────────────────────────────────────────────────────────────────
# Primary Sources (high signal-to-noise)
# ─────────────────────────────────────────────────────────────────────────────

primary:
  frappe_forum:
    name: "Frappe Forum"
    url: "https://discuss.frappe.io"
    type: discourse
    search_pattern: "site:discuss.frappe.io {query}"
    categories:
      - slug: "frappe-framework"
        weight: 1.0
        description: "Core framework discussions"
      - slug: "erpnext"
        weight: 0.7
        description: "ERPNext-specific (some overlap)"
      - slug: "install-update"
        weight: 1.0
        description: "Installation and update issues"
      - slug: "bug"
        weight: 1.0
        description: "Bug reports"
      - slug: "development"
        weight: 0.9
        description: "Development discussions"
    pain_indicators:
      - "error"
      - "problem"
      - "issue"
      - "frustrating"
      - "doesn't work"
      - "can't"
      - "unable to"
      - "failed"
      - "stuck"
      - "help"

  github_bench:
    name: "GitHub - frappe/bench"
    url: "https://github.com/frappe/bench"
    type: github_issues
    search_pattern: "repo:frappe/bench {query}"
    labels_of_interest:
      - "bug"
      - "enhancement"
      - "help wanted"
      - "good first issue"
    high_signal:
      - issues_with_many_reactions
      - issues_with_many_comments
      - long_open_issues
      - recently_closed_wontfix

  github_frappe:
    name: "GitHub - frappe/frappe"
    url: "https://github.com/frappe/frappe"
    type: github_issues
    search_pattern: "repo:frappe/frappe {query}"
    labels_of_interest:
      - "bug"
      - "enhancement"
      - "CLI"
      - "developer-experience"

# ─────────────────────────────────────────────────────────────────────────────
# Secondary Sources (useful but lower signal)
# ─────────────────────────────────────────────────────────────────────────────

secondary:
  reddit_erpnext:
    name: "Reddit r/erpnext"
    url: "https://reddit.com/r/erpnext"
    type: reddit
    search_pattern: "site:reddit.com/r/erpnext {query}"
    notes: "Smaller community, but honest feedback"

  reddit_frappe:
    name: "Reddit r/frappe"
    url: "https://reddit.com/r/frappe"
    type: reddit
    search_pattern: "site:reddit.com/r/frappe {query}"
    notes: "Very small, occasional gems"

  stackoverflow:
    name: "Stack Overflow"
    url: "https://stackoverflow.com"
    type: stackoverflow
    search_pattern: "site:stackoverflow.com [frappe] OR [erpnext] {query}"
    tags:
      - "frappe"
      - "erpnext"
      - "frappe-bench"
    notes: "Technical questions, often installation issues"

  medium:
    name: "Medium Articles"
    url: "https://medium.com"
    type: blog
    search_pattern: "site:medium.com frappe {query}"
    notes: "Tutorial authors often document pain points"

# ─────────────────────────────────────────────────────────────────────────────
# Specialized Sources
# ─────────────────────────────────────────────────────────────────────────────

specialized:
  pypi_stats:
    name: "PyPI Download Stats"
    url: "https://pypistats.org/packages/frappe-bench"
    type: metrics
    notes: "270k monthly downloads - understand user base size"

  github_discussions:
    name: "GitHub Discussions"
    url: "https://github.com/frappe/frappe/discussions"
    type: github_discussions
    notes: "Q&A and ideas - often reveals UX issues"

  frappe_cloud_docs:
    name: "Frappe Cloud Documentation"
    url: "https://frappecloud.com/docs"
    type: documentation
    notes: "Remote deployment patterns, what's supported/not"

# ─────────────────────────────────────────────────────────────────────────────
# Mining Queries (suggested starting points)
# ─────────────────────────────────────────────────────────────────────────────

queries:
  installation:
    - "bench init error"
    - "bench install fails"
    - "mariadb configuration"
    - "node modules error"
    - "python environment"
    - "wkhtmltopdf"
    - "redis connection"

  cli_usability:
    - "bench start error"
    - "bench command not found"
    - "bench migrate fails"
    - "bench update error"
    - "bench build error"

  remote_development:
    - "frappe cloud development"
    - "remote site customization"
    - "sync customizations"
    - "deploy custom app"
    - "client script development"
    - "server script testing"

  customization:
    - "custom doctype"
    - "custom field"
    - "client script error"
    - "server script"
    - "custom report"
    - "print format"
    - "property setter"

  performance:
    - "bench slow"
    - "frappe performance"
    - "background jobs"
    - "scheduler"
    - "memory usage"

  workflow:
    - "development workflow"
    - "debugging frappe"
    - "testing custom app"
    - "version control"
    - "multiple sites"

  documentation:
    - "documentation unclear"
    - "missing documentation"
    - "example needed"
    - "how to"

# ─────────────────────────────────────────────────────────────────────────────
# Mining Schedules (suggested cadence)
# ─────────────────────────────────────────────────────────────────────────────

schedules:
  continuous:
    description: "Always running, low intensity"
    sources: ["frappe_forum", "github_bench"]
    queries: ["installation", "cli_usability"]
    timeframe: "7d"
    max_items: 20

  weekly:
    description: "Weekly deep dive"
    sources: ["frappe_forum", "github_bench", "github_frappe", "reddit_erpnext"]
    queries: ["*"]  # All queries
    timeframe: "7d"
    max_items: 50

  monthly:
    description: "Monthly comprehensive sweep"
    sources: ["*"]  # All sources
    queries: ["*"]
    timeframe: "30d"
    max_items: 100

  targeted:
    description: "Deep dive on specific topic"
    sources: ["frappe_forum", "github_bench", "stackoverflow"]
    queries: ["remote_development"]  # Example: focus area
    timeframe: "90d"
    max_items: 100
